<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學特訓 FPS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* 預設天空藍 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* 遊戲介面 (HUD) */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        /* 準星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* 分數面板 */
        #score-board {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 5px;
        }

        /* 武器升級提示文字 */
        #upgrade-msg {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff8800, 2px 2px 5px #000;
            opacity: 0;
            transition: all 0.3s ease-out;
            pointer-events: none;
        }

        /* 遊戲開始畫面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 20, 40, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 20px #ffaa00;
            margin-bottom: 10px;
        }

        #instructions {
            font-size: 18px;
            color: #eee;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .key-btn {
            display: inline-block;
            background: #333;
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            margin: 0 3px;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background-color: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        #start-btn:hover {
            background-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        /* 答錯時的紅光特效 */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background-color 0.1s;
        }
    </style>
    
    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="damage-overlay"></div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="score-board">分數: <span id="score">0</span></div>
        <div id="upgrade-msg">武器升級！</div>
    </div>

    <div id="start-screen">
        <h1>白晝森林數學 FPS</h1>
        <div id="instructions">
            在白天的森林中生存，每 50 分武器將自動升級！<br><br>
            <b style="color:#00ffff">青色核心機器人</b> 考加減法，<b style="color:#ff4444">紅色核心機器人</b> 考九九乘法。<br>
            胸口、左腳、右腳各有一個數字。<br>
            請射擊 <b style="color:#ffd700">正確答案</b> 的數字方塊。<br><br>
            控制方式：<br>
            <span class="key-btn">W</span><span class="key-btn">A</span><span class="key-btn">S</span><span class="key-btn">D</span> 移動<br>
            <span class="key-btn">滑鼠</span> 瞄準與射擊
        </div>
        <button id="start-btn">點擊開始遊戲</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 全域變數設定 ---
        let camera, scene, renderer, controls;
        let score = 0;
        let weaponLevel = 0; // 武器等級
        let gunGroup = null; // 當前武器模組
        let muzzleFlash; // 槍口火光
        const robots = []; 
        const targetMeshes = []; 
        let raycaster;
        
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        // 音效系統變數
        let audioCtx;
        let noiseBuffer; // 用於真實射擊音效
        let lastStepTime = 0;

        // 遊戲設定參數
        const GAME_SPEED = 3.0; 
        const SPAWN_DISTANCE = 35; 
        const MAX_ROBOTS = 4; // 稍微增加敵人數

        init();
        animate();

        function init() {
            // 1. 初始化場景 (白天森林設定)
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x87CEEB ); // 天空藍
            scene.fog = new THREE.FogExp2( 0x87CEEB, 0.015 ); // 白天霧氣變淡

            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
            camera.position.y = 1.6; 
            scene.add(camera); 

            // 初始化武器 (等級 0)
            buildWeapon(weaponLevel);

            // 初始化槍口火光
            muzzleFlash = new THREE.PointLight(0xffffaa, 0, 5);
            muzzleFlash.position.set(0.4, -0.3, -1.0);
            camera.add(muzzleFlash);

            // 3. 初始化燈光 (白天陽光)
            const ambientLight = new THREE.AmbientLight( 0xffffff, 0.7 ); 
            scene.add( ambientLight );
            
            const dirLight = new THREE.DirectionalLight( 0xfffae6, 1.2 ); // 偏黃的陽光
            dirLight.position.set( 50, 100, 20 );
            dirLight.castShadow = true;
            scene.add( dirLight );

            // 4. 建立環境 (森林草地與樹木)
            // 草地地面
            const groundGeo = new THREE.PlaneGeometry( 500, 500 );
            const groundMat = new THREE.MeshStandardMaterial( { color: 0x1A3320, roughness: 1.0 } );
            const ground = new THREE.Mesh( groundGeo, groundMat );
            ground.rotation.x = -Math.PI / 2;
            scene.add( ground );

            // 隨機生成樹木
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.7, 3, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 1.0 });
            const leafGeo1 = new THREE.ConeGeometry(2.5, 4, 8);
            const leafGeo2 = new THREE.ConeGeometry(2.0, 3, 8);
            const leafGeo3 = new THREE.ConeGeometry(1.5, 2, 8);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x0f380f, roughness: 0.9 });

            for(let i=0; i<150; i++) {
                const tree = new THREE.Group();
                
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 1.5;
                tree.add(trunk);
                
                const l1 = new THREE.Mesh(leafGeo1, leafMat); l1.position.y = 3.5; tree.add(l1);
                const l2 = new THREE.Mesh(leafGeo2, leafMat); l2.position.y = 5.5; tree.add(l2);
                const l3 = new THREE.Mesh(leafGeo3, leafMat); l3.position.y = 7.0; tree.add(l3);

                const scale = 0.8 + Math.random() * 1.5;
                tree.scale.set(scale, scale, scale);

                // 避開中央玩家初始區域
                let rx, rz;
                do {
                    rx = (Math.random() - 0.5) * 300;
                    rz = (Math.random() - 0.5) * 300;
                } while(Math.abs(rx) < 15 && Math.abs(rz) < 15);
                
                tree.position.set( rx, 0, rz );
                tree.rotation.y = Math.random() * Math.PI;
                scene.add( tree );
            }

            // 5. 初始化渲染器
            const container = document.getElementById( 'game-container' );
            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            // 6. 控制器設定
            controls = new PointerLockControls( camera, document.body );
            const startScreen = document.getElementById( 'start-screen' );
            const startBtn = document.getElementById( 'start-btn' );
            const hud = document.getElementById( 'hud' );

            startBtn.addEventListener( 'click', function () {
                controls.lock(); 
                initAudio(); 
            } );

            controls.addEventListener( 'lock', function () {
                startScreen.style.display = 'none';
                hud.style.display = 'block';
            } );

            controls.addEventListener( 'unlock', function () {
                startScreen.style.display = 'flex';
                hud.style.display = 'none';
            } );

            scene.add( controls.getObject() );

            // 鍵盤事件監聽
            const onKeyDown = function ( event ) {
                switch ( event.code ) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = function ( event ) {
                switch ( event.code ) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );

            // 7. 射擊機制 
            raycaster = new THREE.Raycaster();
            document.addEventListener( 'mousedown', onShoot );
            window.addEventListener( 'resize', onWindowResize );

            for(let i=0; i<MAX_ROBOTS; i++) {
                spawnRobot();
            }
        }

        // 建立/升級 武器模型
        function buildWeapon(level) {
            if (gunGroup) {
                camera.remove(gunGroup); // 移除舊武器
            }
            
            gunGroup = new THREE.Group();
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.9 });
            
            // 根據等級設定發光顏色
            let glowColor = 0x00ffff; // Lv0: 青
            if (level === 1) glowColor = 0x00ff00; // Lv1: 綠
            else if (level === 2) glowColor = 0xaa00ff; // Lv2: 紫
            else if (level >= 3) glowColor = 0xff4400; // Lv3+: 橘紅

            const glowMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: glowColor, emissiveIntensity: 0.8 });

            if (level === 0) {
                // Lv.1 (0-49): 單管手槍
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 16), gunMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0, -0.4);
                const glow = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.4), glowMat);
                glow.position.set(0, 0, -0.2);
                gunGroup.add(barrel, glow);

            } else if (level === 1) {
                // Lv.2 (50-99): 雙管步槍
                const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.9, 16), gunMat);
                b1.rotation.x = Math.PI / 2; b1.position.set(-0.06, 0, -0.45);
                const b2 = b1.clone(); b2.position.set(0.06, 0, -0.45);
                const glow = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.12, 0.5), glowMat);
                glow.position.set(0, 0, -0.2);
                gunGroup.add(b1, b2, glow);

            } else if (level === 2) {
                // Lv.3 (100-149): 三管機槍
                const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.0, 16), gunMat);
                b1.rotation.x = Math.PI / 2; b1.position.set(0, 0.07, -0.5);
                const b2 = b1.clone(); b2.position.set(-0.07, -0.05, -0.5);
                const b3 = b1.clone(); b3.position.set(0.07, -0.05, -0.5);
                const glow = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.4, 8), glowMat);
                glow.rotation.x = Math.PI / 2; glow.position.set(0, 0, -0.2);
                gunGroup.add(b1, b2, b3, glow);

            } else {
                // Lv.4+ (150+): 重型破壞砲
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.12, 1.2, 16), gunMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0, -0.6);
                const glow = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.4, 16), glowMat);
                glow.rotation.x = Math.PI / 2;
                glow.position.set(0, 0, -0.2);
                gunGroup.add(barrel, glow);
            }

            gunGroup.position.set(0.4, -0.3, -0.5);
            camera.add(gunGroup);
        }

        // 檢查並觸發武器升級
        function checkWeaponUpgrade() {
            // 每 50 分為一個等級
            const newLevel = Math.max(0, Math.floor(score / 50));
            
            if (newLevel !== weaponLevel) {
                weaponLevel = newLevel;
                buildWeapon(weaponLevel);
                
                // 顯示升級 UI 提示
                const msg = document.getElementById('upgrade-msg');
                msg.innerText = `武器升級！ (Lv.${weaponLevel + 1})`;
                msg.style.opacity = 1;
                msg.style.transform = 'translate(-50%, -50%) scale(1.2)';
                msg.style.color = weaponLevel >= 3 ? '#ff4400' : (weaponLevel === 2 ? '#aa00ff' : '#00ff00');
                
                // 2秒後淡出
                setTimeout(() => {
                    msg.style.opacity = 0;
                    msg.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 2000);
            }
        }

        function createTextPlane(text, width, height, textColor, bgColor, fontSize, isTarget = false, value = null, isCorrect = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; 
            canvas.height = Math.round(1024 * (height / width));
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isTarget) {
                ctx.strokeStyle = textColor; // 根據文字顏色決定邊框顏色
                ctx.lineWidth = 20;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }

            ctx.font = `bold ${fontSize}px 'Courier New', Courier, monospace`;
            let textWidth = ctx.measureText(text).width;
            if (textWidth > canvas.width * 0.9) {
                fontSize = fontSize * (canvas.width * 0.9 / textWidth);
                ctx.font = `bold ${fontSize}px 'Courier New', Courier, monospace`;
            }

            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: false });
            const geometry = new THREE.PlaneGeometry(width, height);
            const mesh = new THREE.Mesh(geometry, material);

            if (isTarget) {
                mesh.userData = { isTarget: true, value: value, isCorrect: isCorrect };
            }

            return mesh;
        }

        // 音效系統
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // 預先產生白噪音 buffer 用於逼真的射擊聲
                const bufferSize = audioCtx.sampleRate * 2.0; 
                noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
            }
        }

        // 依據武器等級播放不同真實射擊聲
        function playShootSound(level) {
            if (!audioCtx || !noiseBuffer) return;
            
            // 使用白噪音加上 Envelope 與 Filter 產生槍聲
            const noiseSrc = audioCtx.createBufferSource();
            noiseSrc.buffer = noiseBuffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            
            const gainNode = audioCtx.createGain();
            
            let dur = 0.2;
            // 根據武器等級調整槍聲音色
            if (level === 0) {
                filter.frequency.value = 1000;
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                dur = 0.15;
            } else if (level === 1) {
                filter.frequency.value = 800;
                gainNode.gain.setValueAtTime(0.9, audioCtx.currentTime);
                dur = 0.2;
            } else if (level === 2) {
                filter.frequency.value = 600;
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                dur = 0.25;
            } else {
                filter.frequency.value = 400; // 重砲低沉音
                gainNode.gain.setValueAtTime(1.2, audioCtx.currentTime);
                dur = 0.4;
            }

            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);

            noiseSrc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            noiseSrc.start();
            noiseSrc.stop(audioCtx.currentTime + dur);
        }

        function playCorrectSound() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const playNote = (freq, time, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                osc.start(time);
                osc.stop(time + duration);
            };
            playNote(440, t, 0.1);
            playNote(554, t + 0.1, 0.1);
            playNote(659, t + 0.2, 0.2); 
        }

        function playWrongSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playStepSound(time) {
            if (!audioCtx || time - lastStepTime < 400) return; 
            lastStepTime = time;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime); // 配合荒野泥土地，調低頻率
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function generateMathProblem() {
            const isAddition = Math.random() > 0.5;
            let a, b, correctAns, str;

            if (isAddition) {
                a = Math.floor(Math.random() * 10) + 1; 
                b = Math.floor(Math.random() * 10) + 1; 
                correctAns = a + b;
                str = `${a}+${b}=?`;
            } else {
                a = Math.floor(Math.random() * 10) + 10; 
                b = Math.floor(Math.random() * 9) + 1;  
                correctAns = a - b;
                str = `${a}-${b}=?`;
            }

            let wrong1 = correctAns + (Math.floor(Math.random() * 3) + 1) * (Math.random()>0.5?1:-1);
            let wrong2 = correctAns + (Math.floor(Math.random() * 3) + 1) * (Math.random()>0.5?1:-1);
            
            while (wrong1 === correctAns || wrong1 < 0) wrong1++;
            while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 < 0) wrong2++;

            const answers = [
                { val: correctAns, isCorrect: true },
                { val: wrong1, isCorrect: false },
                { val: wrong2, isCorrect: false }
            ];
            answers.sort(() => Math.random() - 0.5);

            return { equationStr: str, answers: answers };
        }

        // 產生九九乘法題目與答案
        function generateMultiplicationProblem() {
            const a = Math.floor(Math.random() * 9) + 1; // 1-9
            const b = Math.floor(Math.random() * 9) + 1; // 1-9
            const correctAns = a * b;
            const str = `${a}x${b}=?`;

            // 產生兩個錯誤答案
            let wrong1 = correctAns + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            let wrong2 = correctAns + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            
            while (wrong1 === correctAns || wrong1 <= 0) wrong1++;
            while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 <= 0) wrong2++;

            const answers = [
                { val: correctAns, isCorrect: true },
                { val: wrong1, isCorrect: false },
                { val: wrong2, isCorrect: false }
            ];
            answers.sort(() => Math.random() - 0.5);

            return { equationStr: str, answers: answers };
        }

        function spawnRobot() {
            const isRedRobot = Math.random() > 0.5; // 50% 機率生成紅色乘法機器人
            const robotGroup = new THREE.Group();
            
            // 真實感金屬材質
            const metalMat = new THREE.MeshStandardMaterial({ 
                color: 0x555555, 
                metalness: 0.8,
                roughness: 0.3
            });
            const darkMetalMat = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                metalness: 0.9,
                roughness: 0.2
            });

            // 根據機器人種類設定核心發光顏色
            const glowColor = isRedRobot ? 0xff0000 : 0x00ffff;
            const glowMat = new THREE.MeshStandardMaterial({
                color: glowColor,
                emissive: glowColor,
                emissiveIntensity: 2.0
            });

            // 身體 (胸膛 + 骨盆)
            const chest = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 0.7), metalMat);
            chest.position.y = 1.8;
            robotGroup.add(chest);
            
            const pelvis = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.5), darkMetalMat);
            pelvis.position.y = 1.05;
            robotGroup.add(pelvis);

            // 發光核心
            const core = new THREE.Mesh(new THREE.CircleGeometry(0.25, 16), glowMat);
            core.position.set(0, 0, 0.36);
            chest.add(core);

            // 頭 (Head)
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), metalMat);
            head.position.y = 2.6;
            robotGroup.add(head);
            
            // 面罩 (Visor)
            const visor = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.15), glowMat);
            visor.position.set(0, 0.1, 0.31);
            head.add(visor);

            // 關節材質
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            // 腳
            const legRGroup = new THREE.Group();
            legRGroup.position.set(0.3, 0.8, 0);
            const hipR = new THREE.Mesh(new THREE.SphereGeometry(0.2), jointMat);
            const calfR = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.8, 8), darkMetalMat);
            calfR.position.y = -0.4;
            legRGroup.add(hipR, calfR);
            robotGroup.add(legRGroup);

            const legLGroup = new THREE.Group();
            legLGroup.position.set(-0.3, 0.8, 0);
            const hipL = new THREE.Mesh(new THREE.SphereGeometry(0.2), jointMat);
            const calfL = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.8, 8), darkMetalMat);
            calfL.position.y = -0.4;
            legLGroup.add(hipL, calfL);
            robotGroup.add(legLGroup);

            // 手
            const armRGroup = new THREE.Group();
            armRGroup.position.set(0.7, 2.1, 0);
            const shoulderR = new THREE.Mesh(new THREE.SphereGeometry(0.2), jointMat);
            const forearmR = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.08, 1.0, 8), darkMetalMat);
            forearmR.position.y = -0.5;
            armRGroup.add(shoulderR, forearmR);
            robotGroup.add(armRGroup);

            const armLGroup = new THREE.Group();
            armLGroup.position.set(-0.7, 2.1, 0);
            const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(0.2), jointMat);
            const forearmL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.08, 1.0, 8), darkMetalMat);
            forearmL.position.y = -0.5;
            armLGroup.add(shoulderL, forearmL);
            robotGroup.add(armLGroup);

            robotGroup.userData = {
                legL: legLGroup, legR: legRGroup, armL: armLGroup, armR: armRGroup,
                walkPhase: Math.random() * Math.PI * 2 
            };

            // 決定數學題目與標籤顏色
            const problem = isRedRobot ? generateMultiplicationProblem() : generateMathProblem();
            const textColor = isRedRobot ? '#ffff00' : '#ff0000'; // 紅色機器人配黃字，青色機器人配紅字

            const equationLabel = createTextPlane(problem.equationStr, 4, 0.8, textColor, '#000000', 300);
            equationLabel.position.set(0, 3.5, 0);
            robotGroup.add(equationLabel);

            const targetWidth = 0.8;
            const targetHeight = 0.6;
            
            // 將答案面板掛載在機器人身上
            const ansChest = createTextPlane(problem.answers[0].val.toString(), targetWidth, targetHeight, textColor, '#000000', 250, true, problem.answers[0].val, problem.answers[0].isCorrect);
            ansChest.position.set(0, -0.15, 0.36); 
            ansChest.userData.parentRobot = robotGroup; 
            chest.add(ansChest);
            targetMeshes.push(ansChest); 

            const ansLegR = createTextPlane(problem.answers[1].val.toString(), targetWidth*0.6, targetHeight*0.6, textColor, '#000000', 250, true, problem.answers[1].val, problem.answers[1].isCorrect);
            ansLegR.position.set(0, -0.4, 0.16); 
            ansLegR.userData.parentRobot = robotGroup;
            legRGroup.add(ansLegR); 
            targetMeshes.push(ansLegR);

            const ansArmL = createTextPlane(problem.answers[2].val.toString(), targetWidth*0.6, targetHeight*0.6, textColor, '#000000', 250, true, problem.answers[2].val, problem.answers[2].isCorrect);
            ansArmL.position.set(0, -0.5, 0.13); 
            ansArmL.userData.parentRobot = robotGroup;
            armLGroup.add(ansArmL); 
            targetMeshes.push(ansArmL);

            // 避開中央玩家產生
            let angle, rx, rz;
            do {
                angle = Math.random() * Math.PI * 2;
                rx = Math.cos(angle) * SPAWN_DISTANCE;
                rz = Math.sin(angle) * SPAWN_DISTANCE;
            } while (Math.abs(rx) < 10 && Math.abs(rz) < 10);
            
            robotGroup.position.set(rx, 0, rz);
            scene.add(robotGroup);
            robots.push(robotGroup);
        }

        function destroyRobot(robotGroup) {
            scene.remove(robotGroup);
            robotGroup.traverse((child) => {
                if (child.isMesh) {
                    child.geometry.dispose();
                    if(child.material.map) child.material.map.dispose();
                    child.material.dispose();
                }
            });

            const index = robots.indexOf(robotGroup);
            if (index > -1) robots.splice(index, 1);

            for (let i = targetMeshes.length - 1; i >= 0; i--) {
                if (targetMeshes[i].userData.parentRobot === robotGroup) {
                    targetMeshes.splice(i, 1);
                }
            }
        }

        function onShoot() {
            if (!controls.isLocked) return;

            playShootSound(weaponLevel); // 根據等級發出真實槍聲
            
            // 槍口火光閃爍
            if (muzzleFlash) {
                muzzleFlash.intensity = 2 + weaponLevel;
                setTimeout(() => { muzzleFlash.intensity = 0; }, 50);
            }

            raycaster.setFromCamera( new THREE.Vector2(0, 0), camera );
            const intersects = raycaster.intersectObjects( targetMeshes );

            if ( intersects.length > 0 ) {
                const hitObject = intersects[ 0 ].object;
                
                if (hitObject.userData.isTarget) {
                    if (hitObject.userData.isCorrect) {
                        playCorrectSound(); 
                        destroyRobot(hitObject.userData.parentRobot);
                        
                        score += 10;
                        document.getElementById('score').innerText = score;
                        checkWeaponUpgrade(); // 檢查是否可以升級武器

                        spawnRobot();
                    } else {
                        playWrongSound(); 
                        flashScreenRed();
                    }
                }
            }
        }

        function flashScreenRed() {
            const overlay = document.getElementById('damage-overlay');
            overlay.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
            setTimeout(() => {
                overlay.style.backgroundColor = 'rgba(255, 0, 0, 0)';
            }, 150);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );

            const time = performance.now();
            const delta = ( time - prevTime ) / 1000;

            if ( controls.isLocked === true ) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize(); 

                const playerSpeed = 50.0; 
                if ( moveForward || moveBackward ) velocity.z -= direction.z * playerSpeed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * playerSpeed * delta;

                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );
                
                if(controls.getObject().position.y < 1.6) {
                    controls.getObject().position.y = 1.6;
                }

                if (Math.abs(velocity.x) > 2 || Math.abs(velocity.z) > 2) {
                    playStepSound(time);
                }
            }

            const playerPos = camera.position.clone();
            playerPos.y = 0; 

            for (let i = robots.length - 1; i >= 0; i--) {
                const robot = robots[i];
                
                const targetLook = playerPos.clone();
                targetLook.y = robot.position.y;
                robot.lookAt(targetLook);

                const equationPlane = robot.children.find(c => c.geometry && c.geometry.type === 'PlaneGeometry' && c.position.y > 3);
                if(equationPlane) {
                    equationPlane.lookAt(camera.position);
                }

                robot.translateZ(GAME_SPEED * delta);

                const walkFreq = 5; 
                const walkAmp = 0.6; 
                robot.userData.walkPhase += delta * walkFreq;
                robot.userData.legL.rotation.x = Math.sin(robot.userData.walkPhase) * walkAmp;
                robot.userData.legR.rotation.x = Math.sin(robot.userData.walkPhase + Math.PI) * walkAmp;
                robot.userData.armL.rotation.x = Math.sin(robot.userData.walkPhase + Math.PI) * walkAmp; 
                robot.userData.armR.rotation.x = Math.sin(robot.userData.walkPhase) * walkAmp; 

                const dist = robot.position.distanceTo(playerPos);
                if (dist < 2.5) {
                    playWrongSound(); 
                    flashScreenRed();
                    destroyRobot(robot);
                    spawnRobot();
                    
                    // 被撞擊扣分並降級
                    score = Math.max(0, score - 5);
                    document.getElementById('score').innerText = score;
                    checkWeaponUpgrade(); 
                }
            }

            prevTime = time;
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
